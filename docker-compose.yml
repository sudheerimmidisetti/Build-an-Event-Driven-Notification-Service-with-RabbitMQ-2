services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "--silent", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api-publisher:
    build:
      context: ./api-publisher
      dockerfile: Dockerfile
    environment:
      API_PORT: ${API_PORT:-8000}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_EXCHANGE_NAME: notification_exchange
      NOTIFICATION_ROUTING_KEY: notification
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notification_queue}
      DLX_EXCHANGE_NAME: dlx_exchange
      DLQ_QUEUE_NAME: ${DLQ_QUEUE_NAME:-dlq_queue}
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://localhost:8000/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  event-consumer:
    build:
      context: ./event-consumer
      dockerfile: Dockerfile
    environment:
      WORKER_HEALTH_PORT: 8001
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      NOTIFICATION_EXCHANGE_NAME: notification_exchange
      NOTIFICATION_ROUTING_KEY: notification
      NOTIFICATION_QUEUE_NAME: ${NOTIFICATION_QUEUE_NAME:-notification_queue}
      DLX_EXCHANGE_NAME: dlx_exchange
      DLQ_QUEUE_NAME: ${DLQ_QUEUE_NAME:-dlq_queue}
      CONSUMER_MAX_RETRIES: 3
      CONSUMER_PREFETCH: 10
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(\"http://localhost:8001/health\").then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq_data:
